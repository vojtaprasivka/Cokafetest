<!DOCTYPE html>
<html lang="cs">

<head>
<meta charset="UTF-8">
<title>COKAFE AI Chat</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:60px;
background:#f5f5f5;
}

h1{
font-size:40px;
}

p{
font-size:20px;
}

/* CHAT BUBBLE */

.chat-button{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#6b4f4f;
color:white;
border:none;
font-size:26px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* CHAT BOX */

.chat-box{
position:fixed;
bottom:90px;
right:20px;
width:350px;
height:500px;
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:none;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

.chat-header{
background:#6b4f4f;
color:white;
padding:15px;
font-weight:bold;
}

/* MESSAGES */

.chat-messages{
flex:1;
padding:15px;
overflow-y:auto;
font-size:14px;
text-align:left;
display:flex;
flex-direction:column;
}

/* MESSAGE STYLE */

.message{
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* USER */

.user{
background:#e8e8e8;
padding:10px 14px;
border-radius:12px;
margin:8px 0;
max-width:80%;
align-self:flex-end;
}

/* BOT */

.bot{
background:#f1f1f1;
padding:10px 14px;
border-radius:12px;
margin:8px 0;
max-width:80%;
align-self:flex-start;
}

/* INPUT */

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
border:none;
padding:12px;
font-size:14px;
outline:none;
}

.chat-input button{
background:#6b4f4f;
color:white;
border:none;
padding:12px 18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>AI chatbot COKAFE ☕</h1>
<p>Zeptejte se našeho AI asistenta.</p>

<!-- CHAT BUTTON -->

<button class="chat-button" onclick="toggleChat()">💬</button>

<!-- CHAT BOX -->

<div class="chat-box" id="chat">

<div class="chat-header">
Espresso ☕
</div>

<div class="chat-messages" id="messages"></div>

<div class="chat-input">
<input id="input" placeholder="Napište zprávu...">
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script>

function toggleChat(){
const chat = document.getElementById("chat");
chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

async function sendMessage(){

const input = document.getElementById("input");
const messages = document.getElementById("messages");

if(!input.value) return;

const text = input.value;

/* USER MESSAGE */

const user = document.createElement("div");
user.className = "user message";
user.innerText = text;

messages.appendChild(user);

/* CLEAR INPUT */

input.value = "";
input.focus();

/* SCROLL */

messages.scrollTop = messages.scrollHeight;

/* TYPING */

const typing = document.createElement("div");
typing.className = "bot message";
typing.innerText = "Espresso píše...";
messages.appendChild(typing);

messages.scrollTop = messages.scrollHeight;

/* REQUEST */

const response = await fetch("https://horus13.app.n8n.cloud/webhook/ae641119-aa28-4f3f-9fe8-d2ef3ffc9388/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data = await response.json();

/* REMOVE TYPING */

typing.remove();

/* FORMAT TEXT */

let reply = data.output || data.message || "Omlouvám se, něco se pokazilo.";

reply = reply.replace(/\n/g,"<br><br>");

/* BOT MESSAGE */

const bot = document.createElement("div");
bot.className = "bot message";
bot.innerHTML = reply;

messages.appendChild(bot);

/* SCROLL */

messages.scrollTop = messages.scrollHeight;

}

/* ENTER SEND */

document.getElementById("input").addEventListener("keypress",function(e){
if(e.key === "Enter"){
sendMessage();
}
});

</script>

</body>
</html>
